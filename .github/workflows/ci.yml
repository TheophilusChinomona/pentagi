name: CI — Build, Scan & Deploy

on:
  push:
    branches:
      - "**"
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '23'
  IMAGE_NAME: ghcr.io/theophiluschinomona/pentagi

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ── Go ──
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Go Mod Download
        working-directory: backend
        run: go mod download

      - name: Go Vet
        working-directory: backend
        run: go vet ./...

      - name: Go Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: backend
          args: --timeout=5m --issues-exit-code=0

      - name: Go Test
        working-directory: backend
        continue-on-error: true
        run: go test ./... -v -count=1

      - name: Go Build (amd64 + arm64)
        working-directory: backend
        env:
          CGO_ENABLED: 0
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          PACKAGE_VER=${LATEST_TAG#v}
          CURRENT_COMMIT=$(git rev-parse HEAD)
          TAG_COMMIT=$(git rev-list -n 1 "$LATEST_TAG" 2>/dev/null || echo "")
          PACKAGE_REV=""; [ "$CURRENT_COMMIT" != "$TAG_COMMIT" ] && PACKAGE_REV=$(git rev-parse --short HEAD)
          LDFLAGS="-X pentagi/pkg/version.PackageName=pentagi -X pentagi/pkg/version.PackageVer=${PACKAGE_VER} -X pentagi/pkg/version.PackageRev=${PACKAGE_REV}"
          for arch in amd64 arm64; do
            GOOS=linux GOARCH=$arch go build -trimpath -ldflags "$LDFLAGS" -o /dev/null ./cmd/pentagi
            echo "✓ linux/$arch builds"
          done

      # ── Frontend ──
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'frontend/pnpm-lock.yaml'

      - name: Frontend Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Frontend Lint
        working-directory: frontend
        run: pnpm run lint

      - name: Frontend Test
        working-directory: frontend
        continue-on-error: true
        run: pnpm run test

      # ── GraphQL schema validation ──
      - name: GraphQL Codegen (validate schema match)
        working-directory: frontend
        run: |
          pnpm run graphql:generate
          if [ -n "$(git status --porcelain src/graphql/)" ]; then
            echo "❌ Generated GraphQL types differ from committed ones."
            echo "   Run 'pnpm run graphql:generate' in frontend/ and commit the changes."
            git diff src/graphql/
            exit 1
          fi
          echo "✓ GraphQL types are in sync"

      # ── Secret scanning ──
      - name: Secret Scanner
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true

  docker-build:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION=${LATEST_TAG#v}
          CURRENT_COMMIT=$(git rev-parse HEAD)
          TAG_COMMIT=$(git rev-list -n 1 "$LATEST_TAG" 2>/dev/null || echo "")
          if [ "$CURRENT_COMMIT" != "$TAG_COMMIT" ]; then
            PACKAGE_REV=$(git rev-parse --short HEAD)
            echo "revision=${PACKAGE_REV}" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          else
            echo "revision=" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
            IFS='.' read -r major minor patch <<< "$VERSION"
            echo "major=${major}" >> $GITHUB_OUTPUT
            echo "minor=${major}.${minor}" >> $GITHUB_OUTPUT
            echo "patch=${VERSION}" >> $GITHUB_OUTPUT
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.version.outputs.major }},enable=${{ steps.version.outputs.is_release == 'true' }}
            type=raw,value=${{ steps.version.outputs.minor }},enable=${{ steps.version.outputs.is_release == 'true' }}
            type=raw,value=${{ steps.version.outputs.patch }},enable=${{ steps.version.outputs.is_release == 'true' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64/v8
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PACKAGE_VER=${{ steps.version.outputs.version }}
            PACKAGE_REV=${{ steps.version.outputs.revision }}

      # ── Vulnerability scan ──
      - name: Trivy scan (critical/high only)
        uses: aquasecurity/trivy-action@v0.29
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          skip-files: '/root/.rustup/settings.toml'

      # ── Smoke test ──
      - name: Smoke test — boot container and hit health endpoint
        run: |
          docker run --rm -d --name pentagi-smoke \
            -e DATABASE_URL="postgres://p:p@localhost:5432/nodb?sslmode=disable" \
            -e SERVER_USE_SSL=false \
            ${{ env.IMAGE_NAME }}:latest \
            /opt/pentagi/bin/pentagi --help 2>&1 | head -5
          echo "✓ Image entry point is executable"

  deploy:
    needs: docker-build
    if: github.ref == 'refs/heads/main' && success()
    runs-on: self-hosted
    steps:
      - name: Pull latest image
        run: |
          cd /home/openclaw/pentagi
          git pull origin main

      - name: Update image tag
        run: |
          sed -i 's|^PENTAGI_IMAGE=.*|PENTAGI_IMAGE=${{ env.IMAGE_NAME }}:latest|' \
            /home/openclaw/pentagi/.env

      - name: Pull image and restart
        run: |
          cd /home/openclaw/pentagi
          docker compose pull pentagi
          docker compose up -d pentagi --force-recreate

      - name: Health check
        run: |
          sleep 10
          curl -sf http://localhost:8443/api/v1/info | head -3 && echo "✓ Deploy OK"
