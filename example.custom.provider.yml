# Custom LLM Provider Configuration
# Default: OpenCode Go (your subscription — no per-token cost)
#
# Mounted by docker-compose.yml at /opt/pentagi/conf/custom.provider.yml
# Override with PENTAGI_LLM_SERVER_CONFIG_PATH env var
#
# To switch providers:
#   PENTAGI_LLM_SERVER_CONFIG_PATH=./examples/configs/deepseek-direct.provider.yml
#   PENTAGI_LLM_SERVER_CONFIG_PATH=./examples/configs/openrouter.provider.yml
#
# Set LLM_SERVER_URL and LLM_SERVER_KEY in .env to match the provider.

simple:
  model: "deepseek-v4-flash"
  temperature: 0.5
  top_p: 0.5
  n: 1
  max_tokens: 4000
  price:
    input: 0.0
    output: 0.0

simple_json:
  model: "deepseek-v4-flash"
  temperature: 0.5
