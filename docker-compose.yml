version: "3.9"

services:
  # ============================================================================
  # Pentest Tools — Built from local Dockerfile
  # ============================================================================
  pentest-tools:
    build:
      context: .
      dockerfile: Dockerfile.pentest
    image: pentest-tools:latest
    container_name: pentest-tools-builder
    volumes:
      # Optional: persist tool caches / wordlists across rebuilds
      - pentest-cache:/root/.cache
      - pentest-wordlists:/usr/share/wordlists
    command: echo "Image built successfully"
    tty: true

  # ============================================================================
  # Optional: PostgreSQL for Hermes memory (vector search)
  # Uncomment if you want persistent memory backend instead of local file
  # ============================================================================
  # postgres:
  #   image: pgvector/pgvector:pg17
  #   container_name: hermes-memory-db
  #   environment:
  #     POSTGRES_USER: hermes
  #     POSTGRES_PASSWORD: hermes_secure_password
  #     POSTGRES_DB: hermes_memory
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U hermes"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  pentest-cache:
  pentest-wordlists:
  # postgres-data:
