# ============================================================================
# Pentest Stack — Athena-Powered Penetration Testing
# Docker-in-Docker architecture for isolated, per-engagement testing
#
# Images are PULLED from GitLab Container Registry, not built locally.
# Tag is selected via ${IMAGE_TAG} (default: stable). Valid values match
# branches/promotion tags published by each repo's CI:
#   dev | staging | prod | stable | latest | <commit-sha>
#
# Memory: external ParadeDB (Postgres + pgvector + pg_search). The agent
# auto-creates schema `hermes_memory` on first connect — no manual init.
#
# Secrets are injected via Infisical — there is no .env file. Run with:
#   infisical run --env=<env> -- docker compose up -d
#
# Required Infisical secrets (see .env.example for the full list):
#   IMAGE_TAG, OPENROUTER_API_KEY, HERMES_MEMORY_DATABASE_URL
# ============================================================================

services:
  # ============================================================================
  # Athena Gateway — thin extension of upstream athena image, with docker-ce-cli
  # added so the agent's terminal_tool can talk to the sibling DinD daemon.
  # See docker/gateway.Dockerfile for build/push instructions.
  # ============================================================================
  athena-gateway:
    image: registry.gitlab.com/chinomonatinotenda19/athena-pentest/gateway:${IMAGE_TAG:-stable}
    container_name: athena-pentest-gateway
    restart: unless-stopped
    pull_policy: always
    ports:
      - "${GATEWAY_LISTEN_IP:-127.0.0.1}:${GATEWAY_LISTEN_PORT:-8443}:8443"
    environment:
      # ---- Memory backend (external ParadeDB) ----
      - HERMES_MEMORY_DATABASE_URL=${HERMES_MEMORY_DATABASE_URL}
      - LANCEDB_EMBED_PROVIDER=${LANCEDB_EMBED_PROVIDER:-openrouter}
      - LANCEDB_EMBED_MODEL=${LANCEDB_EMBED_MODEL:-openai/text-embedding-3-small}

      # ---- LLM provider ----
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}

      # ---- Runtime ----
      - HERMES_HOME=/opt/data
      - TZ=${TZ:-Africa/Johannesburg}

      # ---- Docker-in-Docker ----
      # The agent's terminal_tool shells out to `docker` (CLI binary, not SDK)
      # against the DinD daemon. Requires `docker.io` or `docker-ce-cli`
      # installed in the athena image — the upstream Dockerfile does not
      # currently install it (see README "DinD prereq" note).
      - DOCKER_HOST=tcp://dind:2376
      - DOCKER_TLS_CERTDIR=/certs
      - DOCKER_CERT_PATH=/certs/client
      - DOCKER_TLS_VERIFY=1

      # ---- Agent terminal backend ----
      # Route the agent's `terminal` tool through the docker backend so each
      # command runs in an isolated pentest-tools container inside DinD.
      - TERMINAL_ENV=docker
      - TERMINAL_DOCKER_IMAGE=${PENTEST_TOOLS_IMAGE:-registry.gitlab.com/chinomonatinotenda19/athena-pentest/pentest-tools:${IMAGE_TAG:-stable}}

      # ---- Tool image refs (passed through to engagement scripts) ----
      - PENTEST_TOOLS_IMAGE=${PENTEST_TOOLS_IMAGE:-registry.gitlab.com/chinomonatinotenda19/athena-pentest/pentest-tools:${IMAGE_TAG:-stable}}
      - CODE_TOOLS_IMAGE=${CODE_TOOLS_IMAGE:-registry.gitlab.com/chinomonatinotenda19/athena-pentest/code-tools:${IMAGE_TAG:-stable}}
    volumes:
      - athena-data:/opt/data
      - pentest-results:/pentest/results
      # DinD client cert — the agent uses this to authenticate with the
      # docker daemon at tcp://dind:2376 (see DOCKER_CERT_PATH above).
      - dind-certs:/certs:ro
    networks:
      - athena-network
    depends_on:
      dind:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "7"

  # ============================================================================
  # Docker-in-Docker — Isolated Container Execution
  # ============================================================================
  dind:
    image: docker:27-dind
    container_name: athena-pentest-dind
    restart: unless-stopped
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=/certs
    volumes:
      - dind-certs:/certs
      - dind-storage:/var/lib/docker
    networks:
      - athena-network
    command:
      - dockerd
      - --host=tcp://0.0.0.0:2376
      - --tlsverify
      - --tlscacert=/certs/ca/ca.pem
      - --tlscert=/certs/server/server.pem
      - --tlskey=/certs/server/server-key.pem
      - --storage-driver=overlay2
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ============================================================================
  # Pentest Tools Image Prefetch (one-shot)
  # Pulls the tools image into the DinD daemon so engagement containers
  # start without a per-launch pull. Exits 0 once the pull completes.
  # ============================================================================
  pentest-tools-prefetch:
    image: docker:27-cli
    container_name: athena-pentest-tools-prefetch
    depends_on:
      dind:
        condition: service_started
    environment:
      - DOCKER_HOST=tcp://dind:2376
      - DOCKER_TLS_CERTDIR=/certs
      - DOCKER_CERT_PATH=/certs/client
      - DOCKER_TLS_VERIFY=1
      - PENTEST_TOOLS_IMAGE=${PENTEST_TOOLS_IMAGE:-registry.gitlab.com/chinomonatinotenda19/athena-pentest/pentest-tools:${IMAGE_TAG:-stable}}
    volumes:
      - dind-certs:/certs:ro
    command: >
      sh -c "
        until docker info > /dev/null 2>&1; do sleep 2; done;
        echo 'Pulling pentest-tools image into DinD: '\"$$PENTEST_TOOLS_IMAGE\";
        docker pull \"$$PENTEST_TOOLS_IMAGE\";
      "
    restart: "no"
    networks:
      - athena-network

  # ============================================================================
  # Code Security Tools Image Prefetch (one-shot)
  # ============================================================================
  code-tools-prefetch:
    image: docker:27-cli
    container_name: athena-code-tools-prefetch
    depends_on:
      dind:
        condition: service_started
    environment:
      - DOCKER_HOST=tcp://dind:2376
      - DOCKER_TLS_CERTDIR=/certs
      - DOCKER_CERT_PATH=/certs/client
      - DOCKER_TLS_VERIFY=1
      - CODE_TOOLS_IMAGE=${CODE_TOOLS_IMAGE:-registry.gitlab.com/chinomonatinotenda19/athena-pentest/code-tools:${IMAGE_TAG:-stable}}
    volumes:
      - dind-certs:/certs:ro
    command: >
      sh -c "
        until docker info > /dev/null 2>&1; do sleep 2; done;
        echo 'Pulling code-tools image into DinD: '\"$$CODE_TOOLS_IMAGE\";
        docker pull \"$$CODE_TOOLS_IMAGE\";
      "
    restart: "no"
    networks:
      - athena-network

volumes:
  athena-data:
  pentest-results:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PENTEST_RESULTS_DIR:-/opt/pentest-results}
  dind-certs:
  dind-storage:

networks:
  athena-network:
    driver: bridge
