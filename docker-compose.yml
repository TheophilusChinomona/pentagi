# ============================================================================
# Pentest Stack — Athena-Powered Penetration Testing
#
# Architecture: the gateway shares the *host's* docker daemon via the
# /var/run/docker.sock bind-mount. The agent's terminal_tool spawns engagement
# containers as siblings of the gateway, on the same host docker daemon.
#
# Why not DinD: runc 1.3 + Linux 6.6+ fails to write
# net.ipv4.ip_unprivileged_port_start when creating new netns inside a
# privileged container, even with systempaths/apparmor/seccomp unconfined.
# This is a dedicated single-purpose pentest server, so the host *is* the
# sandbox — bind-mount is appropriate. On a multi-tenant host, switch to
# sysbox runtime instead.
#
# Images are PULLED from GitLab Container Registry, not built locally.
# Tag is selected via ${IMAGE_TAG} (default: stable).
#
# Memory: external ParadeDB (Postgres + pgvector + pg_search). The agent
# auto-creates schema `hermes_memory` on first connect — no manual init.
#
# Secrets are injected via Infisical — there is no .env file. Run with:
#   infisical run --env=<env> -- docker compose up -d
#
# Required Infisical secrets (see .env.example for the full list):
#   IMAGE_TAG, OPENROUTER_API_KEY, ATHENA_MEMORY_DB_URL
# Plus on the host: DOCKER_GID env var (or set in Infisical) — the GID of
# the host's `docker` group, so the gateway's hermes user can read the socket.
# ============================================================================

services:
  # ============================================================================
  # Athena Gateway — thin extension of upstream athena image with docker-ce-cli
  # added so the agent's terminal_tool can shell out to `docker` against the
  # host docker daemon (mounted via /var/run/docker.sock).
  # See docker/gateway.Dockerfile for build/push instructions.
  # ============================================================================
  athena-gateway:
    image: registry.gitlab.com/chinomonatinotenda19/athena-pentest/gateway:${IMAGE_TAG:-stable}
    container_name: athena-pentest-gateway
    restart: unless-stopped
    pull_policy: always
    # No `ports:` block — network_mode: host attaches directly to host net,
    # and the messaging gateway has no inbound HTTP listener anyway.
    # `hermes gateway run` is the messaging-gateway foreground entry point
    # (the image's default ENTRYPOINT/CMD launches the interactive CLI, which
    # exits without a TTY and triggers a restart loop). The gateway connects
    # outbound to Discord/Telegram/WhatsApp using credentials supplied via
    # Infisical — there is no inbound HTTP server to expose by default.
    #
    # Entrypoint override: this kernel blocks AF_UNIX socketpair(2) for the
    # non-root `hermes` user (UID 10000) regardless of seccomp/AppArmor
    # settings (root in same container works fine). Bypassing the image's
    # gosu-drop step. Acceptable on a dedicated pentest box where the
    # mounted /var/run/docker.sock already grants container-root host-root
    # equivalence.
    user: "0:0"
    entrypoint: ["/opt/hermes/.venv/bin/hermes"]
    command: ["gateway", "run"]
    # network_mode: host bypasses a Linux 6.8 + runc/crun kernel bug where
    # creating new netns inside any container fails with EPERM on the sysctl
    # net.ipv4.ip_unprivileged_port_start. Tried: docker.io vs upstream
    # docker-ce 29, runc vs crun, disabled AppArmor profiles for both
    # runtimes, all security_opts unconfined. Nothing else worked on this
    # host kernel. Acceptable on a dedicated pentest box. Revisit when
    # the host kernel is updated past the regression.
    network_mode: host
    # Same kernel/runtime regression as above leaks into seccomp's default
    # filter on this host, blocking socketpair(2) which Python asyncio needs
    # at boot. Unconfining seccomp is acceptable on a dedicated pentest box.
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    # Add the gateway's hermes user to the host's docker group so the bind-
    # mounted socket is readable. DOCKER_GID must match `getent group docker`
    # on the host (default 102 on Kali/Debian).
    group_add:
      - "${DOCKER_GID:-102}"
    environment:
      # ---- Memory backend (external ParadeDB) ----
      # Secret is stored in Infisical as ATHENA_MEMORY_DB_URL; remapped here
      # to the env var name the agent's athena-memory plugin actually reads.
      - HERMES_MEMORY_DATABASE_URL=${ATHENA_MEMORY_DB_URL}
      - LANCEDB_EMBED_PROVIDER=${LANCEDB_EMBED_PROVIDER:-openrouter}
      - LANCEDB_EMBED_MODEL=${LANCEDB_EMBED_MODEL:-openai/text-embedding-3-small}

      # ---- LLM provider ----
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}

      # ---- Messaging: Discord ----
      # DISCORD_BOT_TOKEN passes through directly (Infisical name matches).
      # The other two are stored under different Infisical names; remap here
      # to the env var names hermes_gateway actually reads.
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_ALLOWED_USERS=${DISCORD_USER_ID}
      - DISCORD_ALLOWED_CHANNELS=${DISCORD_CHANNEL_ID}

      # ---- Runtime ----
      - HERMES_HOME=/opt/data
      - TZ=${TZ:-Africa/Johannesburg}

      # ---- Agent terminal backend ----
      # Route the agent's `terminal` tool through the docker backend so each
      # command runs in an isolated pentest-tools container on the host
      # docker daemon (via the /var/run/docker.sock mount below).
      - TERMINAL_ENV=docker
      - TERMINAL_DOCKER_IMAGE=${PENTEST_TOOLS_IMAGE:-registry.gitlab.com/chinomonatinotenda19/athena-pentest/pentest-tools:${IMAGE_TAG:-stable}}

      # ---- Tool image refs (passed through to engagement scripts) ----
      - PENTEST_TOOLS_IMAGE=${PENTEST_TOOLS_IMAGE:-registry.gitlab.com/chinomonatinotenda19/athena-pentest/pentest-tools:${IMAGE_TAG:-stable}}
      - CODE_TOOLS_IMAGE=${CODE_TOOLS_IMAGE:-registry.gitlab.com/chinomonatinotenda19/athena-pentest/code-tools:${IMAGE_TAG:-stable}}
    volumes:
      - athena-data:/opt/data
      - pentest-results:/pentest/results
      # Host docker socket — the agent's terminal_tool reaches the host
      # daemon through here. Mount it RW so the agent can spawn containers.
      - /var/run/docker.sock:/var/run/docker.sock
    # No `networks:` block — network_mode: host attaches directly to host net.
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "7"

volumes:
  athena-data:
  pentest-results:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PENTEST_RESULTS_DIR:-/opt/pentest-results}
